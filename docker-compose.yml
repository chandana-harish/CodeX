version: "3.9"

services:
  auth-mongo:
    image: mongo:7
    container_name: auth-mongo
    restart: unless-stopped
    volumes:
      - auth_mongo_data:/data/db
    networks:
      - training-network

  user-mongo:
    image: mongo:7
    container_name: user-mongo
    restart: unless-stopped
    volumes:
      - user_mongo_data:/data/db
    networks:
      - training-network

  training-mongo:
    image: mongo:7
    container_name: training-mongo
    restart: unless-stopped
    volumes:
      - training_mongo_data:/data/db
    networks:
      - training-network

  attendance-mongo:
    image: mongo:7
    container_name: attendance-mongo
    restart: unless-stopped
    volumes:
      - attendance_mongo_data:/data/db
    networks:
      - training-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    env_file:
      - ./auth-service/.env
    depends_on:
      - auth-mongo
    networks:
      - training-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    restart: unless-stopped
    env_file:
      - ./user-service/.env
    depends_on:
      - user-mongo
      - auth-service
    networks:
      - training-network

  training-service:
    build:
      context: ./training-service
      dockerfile: Dockerfile
    container_name: training-service
    restart: unless-stopped
    env_file:
      - ./training-service/.env
    depends_on:
      - training-mongo
      - user-service
    networks:
      - training-network

  attendance-service:
    build:
      context: ./attendance-service
      dockerfile: Dockerfile
    container_name: attendance-service
    restart: unless-stopped
    env_file:
      - ./attendance-service/.env
    depends_on:
      - attendance-mongo
      - user-service
      - training-service
    networks:
      - training-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - auth-service
      - user-service
      - training-service
      - attendance-service
    networks:
      - training-network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - user-service
      - training-service
      - attendance-service
    networks:
      - training-network

networks:
  training-network:
    driver: bridge

volumes:
  auth_mongo_data:
  user_mongo_data:
  training_mongo_data:
  attendance_mongo_data:
