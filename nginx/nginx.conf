##############################################################################
#  Training Management – NGINX API Gateway / Reverse Proxy
#  Single entry-point: http://localhost:80
#
#  Route table
#  ──────────────────────────────────────────────────────────────────
#  /auth/*             → auth-service:4001        (/auth/*)
#  /users/*            → user-service:4002        (/users/*)
#  /training/*         → training-service:4003    (/training/*)
#  /attendance/*       → attendance-service:4004  (/attendance/*)
#  /health/auth        → auth-service:4001/health
#  /health/users       → user-service:4002/health
#  /health/training    → training-service:4003/health
#  /health/attendance  → attendance-service:4004/health
#  /                   → frontend:80              (React SPA)
##############################################################################

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream auth_service {
        server auth-service:4001;
    }

    upstream user_service {
        server user-service:4002;
    }

    upstream training_service {
        server training-service:4003;
    }

    upstream attendance_service {
        server attendance-service:4004;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── Main server block ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ── Common proxy headers ─────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Increase buffer sizes for JSON payloads
        proxy_buffer_size          16k;
        proxy_buffers              4 32k;
        proxy_busy_buffers_size    64k;
        client_max_body_size       10m;

        # ── Auth Service  →  /auth/* ─────────────────────────────────────────
        location /auth {
            proxy_pass http://auth_service;
        }

        # ── User Service  →  /users/* ────────────────────────────────────────
        location /users {
            proxy_pass http://user_service;
        }

        # ── Training Service  →  /training/* ─────────────────────────────────
        location /training {
            proxy_pass http://training_service;
        }

        # ── Attendance Service  →  /attendance/* ─────────────────────────────
        location /attendance {
            proxy_pass http://attendance_service;
        }

        # ── Aggregated health checks ─────────────────────────────────────────
        location = /health/auth {
            proxy_pass http://auth_service/health;
        }

        location = /health/users {
            proxy_pass http://user_service/health;
        }

        location = /health/training {
            proxy_pass http://training_service/health;
        }

        location = /health/attendance {
            proxy_pass http://attendance_service/health;
        }

        # ── React SPA (catch-all) ────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
        }
    }
}
